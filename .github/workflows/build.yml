name: Gerar EXE - Calibrador Memorial

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install pywin32==306 pillow==10.2.0 lxml==5.1.0 pyinstaller==6.3.0

      - name: Gerar EXE
        shell: cmd
        run: |
          python -m PyInstaller --onefile --windowed ^
            --name "CalibradorMemorial" ^
            --hidden-import win32com.client ^
            --hidden-import win32com.server.util ^
            --hidden-import win32api ^
            --hidden-import win32con ^
            --hidden-import pywintypes ^
            --hidden-import pythoncom ^
            --hidden-import PIL._imaging ^
            --hidden-import PIL.Image ^
            --hidden-import PIL.ImageDraw ^
            --hidden-import lxml.etree ^
            --collect-all win32com ^
            --collect-all lxml ^
            calibrador_memorial.py

      - name: Upload do EXE
        uses: actions/upload-artifact@v4
        with:
          name: CalibradorMemorial-Windows
          path: dist/CalibradorMemorial.exe
          retention-days: 30
